<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HyperStudy Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&family=Inter:wght@400;500;600&family=Noto+Sans+Hebrew:wght@400;500;700&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .hebrew { font-family: 'Noto Sans Hebrew', 'Atkinson Hyperlegible', sans-serif; }
    .dyslexia { font-family: 'Atkinson Hyperlegible', sans-serif; }
    .timer-display { font-size: 5.8rem; font-weight: 700; font-family: monospace; }
    .video-container { position: relative; padding-top: 56.25%; height: 0; overflow: hidden; }
    .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-100">

<!-- Login -->
<div id="login-screen" class="fixed inset-0 bg-zinc-950 z-[100] flex items-center justify-center">
  <div class="bg-zinc-900 p-10 rounded-3xl w-full max-w-md">
    <h2 class="text-3xl font-bold text-center mb-6">HyperStudy</h2>
    
    <select id="account-select" class="w-full bg-zinc-800 p-4 rounded-2xl mb-6">
      <option value="mo">Mo Rosenfeld</option>
      <option value="sarah">Sarah Chen</option>
      <option value="david">David Levi (עברית)</option>
    </select>

    <button onclick="login()" class="w-full bg-amber-400 text-black py-4 rounded-3xl font-bold text-lg">Login to Account</button>
    <p class="text-center text-xs text-zinc-500 mt-6">Demo Mode • Ready for Supabase</p>
  </div>
</div>

<div id="main-app" class="hidden flex h-screen">

  <!-- Sidebar -->
  <div class="w-72 bg-zinc-900 border-r border-zinc-800 flex flex-col">
    <div class="p-6 border-b border-zinc-800">
      <div class="flex items-center gap-3">
        <div class="w-11 h-11 bg-amber-400 text-black rounded-2xl flex items-center justify-center text-3xl font-bold">H</div>
        <div>
          <h1 class="text-2xl font-bold">HyperStudy</h1>
          <p id="current-account" class="text-emerald-400 text-sm"></p>
        </div>
      </div>
    </div>
    <div class="flex-1 p-4 space-y-1 overflow-auto" id="sidebar-nav"></div>
    <div class="p-4 border-t border-zinc-800">
      <button onclick="openSettings()" class="w-full py-3 flex items-center gap-3 hover:bg-zinc-800 rounded-2xl"><i class="fa-solid fa-cog"></i> Settings</button>
      <button onclick="logout()" class="w-full py-3 text-red-400 hover:bg-zinc-800 rounded-2xl mt-2">Logout</button>
    </div>
  </div>

  <!-- Main Content -->
  <div class="flex-1 flex flex-col">
    <div class="h-16 bg-zinc-900 border-b border-zinc-800 px-8 flex items-center justify-between">
      <div class="relative flex-1 max-w-xl">
        <input id="search-input" onkeyup="handleSearchInput(event)" 
               placeholder="Paste notes or search topic..." 
               class="w-full bg-zinc-800 border border-zinc-700 focus:border-amber-400 rounded-3xl px-6 py-3 outline-none">
        <div id="search-dropdown" class="hidden absolute mt-2 w-full bg-zinc-900 border border-zinc-700 rounded-3xl shadow-2xl py-2 z-50 max-h-96 overflow-auto"></div>
      </div>
      <div onclick="toggleTimerModal()" class="cursor-pointer flex items-center gap-3 hover:text-amber-400">
        <i class="fa-solid fa-clock"></i>
        <span id="mini-timer" class="font-mono font-bold">25:00</span>
      </div>
    </div>

    <div class="flex-1 overflow-auto p-8" id="content-area"></div>
  </div>
</div>

<!-- Timer Modal -->
<div id="timer-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
  <div class="bg-zinc-900 rounded-3xl p-10 w-full max-w-md">
    <h2 class="text-2xl font-bold mb-6">Pomodoro Timer</h2>
    <input id="study-min" type="number" value="25" class="w-full bg-zinc-800 p-4 rounded-2xl mb-4">
    <input id="break-min" type="number" value="5" class="w-full bg-zinc-800 p-4 rounded-2xl">
    <div class="mt-8 flex gap-4">
      <button onclick="saveTimerSettings()" class="flex-1 py-4 bg-amber-400 text-black rounded-3xl font-bold">Save</button>
      <button onclick="toggleTimerModal()" class="flex-1 py-4 bg-zinc-800 rounded-3xl">Cancel</button>
    </div>
  </div>
</div>

<!-- Settings Modal -->
<div id="settings-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
  <div class="bg-zinc-900 rounded-3xl p-10 w-full max-w-lg">
    <h2 class="text-2xl font-bold mb-6">Settings</h2>
    <button onclick="toggleLanguage()" class="w-full py-4 bg-zinc-800 rounded-3xl mb-4">🌍 Toggle Hebrew / English</button>
    <button onclick="closeSettings()" class="mt-6 w-full py-4 bg-zinc-800 rounded-3xl">Close</button>
  </div>
</div>

<script>
// Account System
const accounts = {
  mo: { name: "Mo Rosenfeld", email: "mo@example.com" },
  sarah: { name: "Sarah Chen", email: "sarah@example.com" },
  david: { name: "David Levi", email: "david@example.com" }
};

let currentUser = null;
let isHebrew = false;
let timeLeft = 1500;

// Login
function login() {
  const selected = document.getElementById('account-select').value;
  currentUser = accounts[selected];
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('main-app').classList.remove('hidden');
  document.getElementById('current-account').textContent = currentUser.name;
  initApp();
}

function logout() { location.reload(); }

// Search Dropdown + Paste Notes → Quiz
function handleSearchInput(e) {
  const query = e.target.value.trim();
  const dropdown = document.getElementById('search-dropdown');
  if (query.length < 2) { dropdown.classList.add('hidden'); return; }

  let html = `<div class="px-6 py-3 text-amber-400">Actions:</div>`;
  html += `<div onclick="createQuizFromNotes('${query}')" class="px-6 py-3 hover:bg-zinc-800 cursor-pointer">📝 Test Me on These Notes</div>`;
  html += `<div onclick="searchVideos('${query}')" class="px-6 py-3 hover:bg-zinc-800 cursor-pointer">🎥 Find Videos</div>`;

  dropdown.innerHTML = html;
  dropdown.classList.remove('hidden');
}

function createQuizFromNotes(notes) {
  document.getElementById('search-dropdown').classList.add('hidden');
  document.getElementById('content-area').innerHTML = `
    <div class="max-w-2xl mx-auto bg-zinc-900 rounded-3xl p-10">
      <h2 class="text-3xl font-bold mb-6">Smart Quiz from your notes</h2>
      <p class="text-zinc-400 mb-8">"${notes.substring(0,100)}..."</p>
      <button onclick="alert('✅ Great job! You retained the information well.')" class="w-full py-6 bg-emerald-500 rounded-3xl text-xl">Start Quiz</button>
    </div>`;
}

function searchVideos(query) {
  document.getElementById('search-dropdown').classList.add('hidden');
  document.getElementById('content-area').innerHTML = `
    <h2 class="text-3xl font-bold mb-6">Videos for "${query}"</h2>
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
      <div class="video-container"><iframe src="https://www.youtube.com/embed/sQK3Yr4Sc_k" frameborder="0" allowfullscreen></iframe></div>
    </div>`;
}

// Timer, Sidebar, Pages, Settings, Hebrew support...
function initApp() {
  document.getElementById('sidebar-nav').innerHTML = `
    <div onclick="switchPage('dashboard')" class="nav-item flex items-center gap-3 px-5 py-4 rounded-2xl cursor-pointer nav-active"><i class="fa-solid fa-house"></i> Dashboard</div>
    <div onclick="switchPage('study')" class="nav-item flex items-center gap-3 px-5 py-4 rounded-2xl cursor-pointer hover:bg-zinc-800"><i class="fa-solid fa-book"></i> Study</div>
    <div onclick="switchPage('flashcards')" class="nav-item flex items-center gap-3 px-5 py-4 rounded-2xl cursor-pointer hover:bg-zinc-800"><i class="fa-solid fa-cards"></i> Flashcards</div>
    <div onclick="switchPage('quiz')" class="nav-item flex items-center gap-3 px-5 py-4 rounded-2xl cursor-pointer hover:bg-zinc-800"><i class="fa-solid fa-question"></i> Quiz</div>
    <div onclick="switchPage('games')" class="nav-item flex items-center gap-3 px-5 py-4 rounded-2xl cursor-pointer hover:bg-zinc-800"><i class="fa-solid fa-gamepad"></i> Games</div>
    <div onclick="switchPage('videos')" class="nav-item flex items-center gap-3 px-5 py-4 rounded-2xl cursor-pointer hover:bg-zinc-800"><i class="fa-solid fa-video"></i> Videos</div>
  `;
  switchPage('dashboard');
}

function switchPage(page) {
  const area = document.getElementById('content-area');
  if (page === 'dashboard') area.innerHTML = `<h1 class="text-5xl font-bold">Welcome back, ${currentUser.name} 👋</h1><canvas id="chart" class="mt-10 h-80"></canvas>`;
  // Add more pages as needed...
}

function toggleLanguage() {
  isHebrew = !isHebrew;
  document.documentElement.dir = isHebrew ? "rtl" : "ltr";
  document.body.classList.toggle('hebrew', isHebrew);
  alert(isHebrew ? "שפה שונתה לעברית" : "Language changed to English");
}

function openSettings() { document.getElementById('settings-modal').classList.remove('hidden'); }
function closeSettings() { document.getElementById('settings-modal').classList.add('hidden'); }
function toggleTimerModal() { document.getElementById('timer-modal').classList.toggle('hidden'); }
function saveTimerSettings() { toggleTimerModal(); }

console.log("%cHyperStudy SaaS - Ready with Accounts, Hebrew, Smart Quiz & More", "color:#eab308; font-size:16px");
</script>
</body>
</html>
