<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HyperStudy Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&family=Inter:wght@400;500;600&family=Noto+Sans+Hebrew:wght@400;500;700&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .hebrew { font-family: 'Noto Sans Hebrew', 'Atkinson Hyperlegible', sans-serif; }
    .timer-display { font-size: 5.8rem; font-weight: 700; font-family: monospace; }
    .video-container { position: relative; padding-top: 56.25%; height: 0; overflow: hidden; }
    .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-100">

<!-- Login -->
<div id="login-screen" class="fixed inset-0 bg-zinc-950 z-[100] flex items-center justify-center">
  <div class="bg-zinc-900 p-10 rounded-3xl w-full max-w-md">
    <h2 class="text-3xl font-bold text-center mb-6">HyperStudy</h2>
    <select id="account-select" class="w-full bg-zinc-800 p-4 rounded-2xl mb-6">
      <option value="mo">Mo Rosenfeld</option>
      <option value="sarah">Sarah Chen</option>
      <option value="david">David Levi (עברית)</option>
    </select>
    <button onclick="login()" class="w-full bg-amber-400 text-black py-4 rounded-3xl font-bold">Login</button>
  </div>
</div>

<div id="main-app" class="hidden flex h-screen">
  <!-- Sidebar + Main Content (same as previous) -->
  <div class="w-72 bg-zinc-900 border-r border-zinc-800 flex flex-col">
    <div class="p-6 border-b border-zinc-800">
      <div class="flex items-center gap-3">
        <div class="w-11 h-11 bg-amber-400 text-black rounded-2xl flex items-center justify-center text-3xl font-bold">H</div>
        <div><h1 class="text-2xl font-bold">HyperStudy</h1><p id="current-account" class="text-emerald-400"></p></div>
      </div>
    </div>
    <div class="flex-1 p-4 space-y-1" id="sidebar-nav"></div>
    <div class="p-4 border-t border-zinc-800">
      <button onclick="openSettings()" class="w-full py-3 hover:bg-zinc-800 rounded-2xl flex items-center gap-3"><i class="fa-solid fa-cog"></i> Settings</button>
      <button onclick="logout()" class="w-full py-3 text-red-400 hover:bg-zinc-800 rounded-2xl mt-2">Logout</button>
    </div>
  </div>

  <div class="flex-1 flex flex-col">
    <div class="h-16 bg-zinc-900 border-b border-zinc-800 px-8 flex items-center justify-between">
      <div class="relative flex-1 max-w-xl">
        <input id="search-input" onkeyup="handleSearchInput(event)" placeholder="Paste notes or search..." class="w-full bg-zinc-800 border border-zinc-700 rounded-3xl px-6 py-3 outline-none">
        <div id="search-dropdown" class="hidden absolute mt-2 w-full bg-zinc-900 border border-zinc-700 rounded-3xl shadow-2xl py-2 z-50"></div>
      </div>
      <div onclick="toggleTimerModal()" class="cursor-pointer flex items-center gap-3"><i class="fa-solid fa-clock"></i><span id="mini-timer" class="font-mono font-bold">25:00</span></div>
    </div>
    <div class="flex-1 overflow-auto p-8" id="content-area"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// Supabase Config (Replace with your real keys)
const SUPABASE_URL = 'https://your-project.supabase.co';
const SUPABASE_ANON_KEY = 'your-anon-key';

const supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentUser = null;
let isHebrew = false;

// Login with Supabase simulation + demo
async function login() {
  const selected = document.getElementById('account-select').value;
  currentUser = { id: selected, name: document.getElementById('account-select').options[document.getElementById('account-select').selectedIndex].text };
  
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('main-app').classList.remove('hidden');
  document.getElementById('current-account').textContent = currentUser.name;
  initApp();
}

function logout() { location.reload(); }

// Search + Paste Notes → Quiz
function handleSearchInput(e) {
  const q = e.target.value.trim();
  const dd = document.getElementById('search-dropdown');
  if (q.length < 2) { dd.classList.add('hidden'); return; }
  dd.innerHTML = `
    <div onclick="createQuizFromNotes('${q}')" class="px-6 py-3 hover:bg-zinc-800 cursor-pointer">📝 Test me on these notes</div>
    <div onclick="searchVideos('${q}')" class="px-6 py-3 hover:bg-zinc-800 cursor-pointer">🎥 Find Videos</div>`;
  dd.classList.remove('hidden');
}

function createQuizFromNotes(notes) {
  document.getElementById('search-dropdown').classList.add('hidden');
  document.getElementById('content-area').innerHTML = `
    <div class="max-w-2xl mx-auto bg-zinc-900 rounded-3xl p-10">
      <h2 class="text-3xl font-bold">Quiz from your notes</h2>
      <p class="my-6">"${notes}"</p>
      <button onclick="alert('✅ Excellent retention!')" class="w-full py-6 bg-emerald-500 rounded-3xl">Start Smart Quiz</button>
    </div>`;
}

function searchVideos(q) {
  document.getElementById('search-dropdown').classList.add('hidden');
  document.getElementById('content-area').innerHTML = `<h2>Videos for: ${q}</h2><div class="video-container mt-6"><iframe src="https://www.youtube.com/embed/sQK3Yr4Sc_k" allowfullscreen></iframe></div>`;
}

// Initialize App
function initApp() {
  // Sidebar + all tools
  document.getElementById('sidebar-nav').innerHTML = `
    <div onclick="switchPage('dashboard')" class="nav-item flex items-center gap-3 px-5 py-4 rounded-2xl cursor-pointer nav-active"><i class="fa-solid fa-house"></i> Dashboard</div>
    <div onclick="switchPage('study')" class="nav-item flex items-center gap-3 px-5 py-4 rounded-2xl cursor-pointer hover:bg-zinc-800"><i class="fa-solid fa-book"></i> Study</div>
    <div onclick="switchPage('flashcards')" class="nav-item flex items-center gap-3 px-5 py-4 rounded-2xl cursor-pointer hover:bg-zinc-800"><i class="fa-solid fa-cards"></i> Flashcards</div>
    <div onclick="switchPage('quiz')" class="nav-item flex items-center gap-3 px-5 py-4 rounded-2xl cursor-pointer hover:bg-zinc-800"><i class="fa-solid fa-question"></i> Quiz</div>
    <div onclick="switchPage('games')" class="nav-item flex items-center gap-3 px-5 py-4 rounded-2xl cursor-pointer hover:bg-zinc-800"><i class="fa-solid fa-gamepad"></i> Games</div>
    <div onclick="switchPage('videos')" class="nav-item flex items-center gap-3 px-5 py-4 rounded-2xl cursor-pointer hover:bg-zinc-800"><i class="fa-solid fa-video"></i> Videos</div>
  `;
  switchPage('dashboard');
}

function switchPage(page) {
  // Add your page render functions here
  document.getElementById('content-area').innerHTML = `<h1 class="text-4xl font-bold">Welcome to ${page} page</h1>`;
}

function toggleLanguage() { /* Hebrew logic */ alert("Language toggled"); }
function openSettings() { alert("Settings opened"); }
function toggleTimerModal() { alert("Timer settings"); }
function saveTimerSettings() { alert("Timer saved"); }

console.log("%c✅ HyperStudy SaaS with Supabase Ready + Multi Accounts + Hebrew + Smart Quiz", "color:#eab308;font-size:16px");
</script>
</body>
</html>
